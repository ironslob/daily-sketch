# Railway config-as-code — single source of truth for the API service.
#
# Dashboard:
# - Root Directory: /backend (Docker build context)
# - Config as Code: /railway.toml (absolute from repo; does not follow Root Directory)
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
releaseCommand = "alembic upgrade head"
