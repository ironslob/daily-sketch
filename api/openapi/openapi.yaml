openapi: 3.1.0
info:
  title: Daily Sketch API
  version: 0.1.0
  description: |
    Contract-first OpenAPI definition for Daily Sketch.

    Version-one feature routes use the `/api/v1` prefix.
    Process health probes remain at the root (`/health/live`, `/health/ready`)
    and are not versioned under `/api/v1`.

    Authenticated feature endpoints use the `bearerAuth` security scheme
    (Descope-issued JWT). Health probes are unauthenticated.
servers:
  - url: http://localhost:8000
    description: Local development
paths:
  /health/live:
    get:
      operationId: getHealthLive
      tags:
        - health
      summary: Liveness probe
      description: Confirms the process can respond. Does not check dependencies.
      responses:
        "200":
          description: Process is alive
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthLiveResponse"
              example:
                status: ok
        "500":
          $ref: "#/components/responses/InternalError"
  /health/ready:
    get:
      operationId: getHealthReady
      tags:
        - health
      summary: Readiness probe
      description: Confirms required configuration and database connectivity.
      responses:
        "200":
          description: Service is ready
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"
              example:
                status: ok
                checks:
                  database: ok
                  storage_config: ok
        "503":
          description: Service is not ready
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"
              example:
                status: unavailable
                checks:
                  database: unavailable
                  storage_config: ok
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/me:
    get:
      operationId: getMe
      tags:
        - me
      summary: Current authenticated user
      description: |
        Returns the local application user for the authenticated Descope subject.
        On first successful authentication the backend provisions a local user
        with an incomplete profile and default preferences.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
              example:
                id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
                username: null
                display_name: New sketcher
                profile_completed: false
                status: incomplete
                preferences:
                  notifications_enabled: false
                  notification_time_local: null
                  timezone: UTC
                  remember_timer_option: false
                  remembered_timer_mode: null
                  remembered_timer_seconds: null
                  appearance: system
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      operationId: updateMe
      tags:
        - me
      summary: Update current user profile
      description: |
        Updates the authenticated user's public profile fields.
        Setting a valid unique username and a non-empty display name completes
        the profile (`profile_completed` becomes true and status becomes active).
        Usernames are case-insensitive and must match `^[A-Za-z0-9_]{3,30}$`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
            example:
              username: sketchy_matt
              display_name: Matt
              bio: Sketching every day.
      responses:
        "200":
          description: Updated current user
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
              example:
                id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
                username: sketchy_matt
                display_name: Matt
                profile_completed: true
                status: active
                preferences:
                  notifications_enabled: false
                  notification_time_local: null
                  timezone: UTC
                  remember_timer_option: false
                  remembered_timer_mode: null
                  remembered_timer_seconds: null
                  appearance: system
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/me/preferences:
    get:
      operationId: getMyPreferences
      tags:
        - me
      summary: Current user preferences
      description: Returns server-backed preferences for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Preferences
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesSummary"
              example:
                notifications_enabled: true
                notification_time_local: "09:00:00"
                timezone: UTC
                remember_timer_option: true
                remembered_timer_mode: countdown
                remembered_timer_seconds: 300
                appearance: system
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      operationId: updateMyPreferences
      tags:
        - me
      summary: Update current user preferences
      description: |
        Partially updates preferences. Timer preferences must be consistent:
        `countdown` requires `remembered_timer_seconds` in {60, 180, 300, 600};
        `no_timer` requires `remembered_timer_seconds` to be null.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferencesUpdate"
            example:
              notifications_enabled: true
              notification_time_local: "09:00:00"
              remember_timer_option: true
              remembered_timer_mode: countdown
              remembered_timer_seconds: 300
              appearance: dark
      responses:
        "200":
          description: Updated preferences
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesSummary"
              example:
                notifications_enabled: true
                notification_time_local: "09:00:00"
                timezone: UTC
                remember_timer_option: true
                remembered_timer_mode: countdown
                remembered_timer_seconds: 300
                appearance: dark
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/users/{username}:
    get:
      operationId: getPublicUser
      tags:
        - users
      summary: Public profile by username
      description: |
        Returns a public-safe projection of an active user with a completed profile.
        Does not require authentication. Excludes email, Descope subject, preferences,
        moderation internals, Drafts, and private session analytics.
      parameters:
        - name: username
          in: path
          required: true
          description: Public username (case-insensitive lookup).
          schema:
            type: string
            minLength: 3
            maxLength: 30
          example: sketchy_matt
      responses:
        "200":
          description: Public profile
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUser"
              example:
                id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
                username: sketchy_matt
                display_name: Matt
                bio: Sketching every day.
                avatar_url: null
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/prompts/today:
    get:
      operationId: getTodaysPrompt
      tags:
        - prompts
      summary: Today's Daily Prompt
      description: |
        Returns the published Daily Prompt for the current Prompt Date
        (UTC calendar date). Available to guests and authenticated users.
        Does not invent a local prompt when none is published.
      responses:
        "200":
          description: Today's published Daily Prompt
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPrompt"
              example:
                id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                prompt_date: "2026-07-18"
                word_1: Chocolate
                word_2: Coffee
                word_3: Banana
                status: published
                published_at: "2026-07-17T00:00:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/prompts/{prompt_id}:
    get:
      operationId: getPromptById
      tags:
        - prompts
      summary: Daily Prompt by ID
      description: |
        Returns a published Daily Prompt by its identifier.
        Draft and withdrawn prompts are not returned.
      parameters:
        - name: prompt_id
          in: path
          required: true
          description: Daily Prompt UUID.
          schema:
            $ref: "#/components/schemas/UUID"
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
      responses:
        "200":
          description: Published Daily Prompt
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPrompt"
              example:
                id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                prompt_date: "2026-07-18"
                word_1: Chocolate
                word_2: Coffee
                word_3: Banana
                status: published
                published_at: "2026-07-17T00:00:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/feed/recent:
    get:
      operationId: getRecentFeed
      tags:
        - feed
      summary: Recent community feed
      description: |
        Returns a reverse-chronological page of published Submissions
        ordered by `published_at DESC, id DESC`. Soft-deleted, hidden,
        removed, and suspended/deleted-author content is excluded.
        Available to guests and authenticated users. When authenticated,
        `is_owner` and `viewer_has_liked` reflect the viewer
        (`viewer_has_liked` remains false until Likes land in Phase 9).
        Pass an opaque `cursor` from a previous page to continue
        keyset pagination without duplicates or skips under concurrent
        inserts.
      parameters:
        - name: cursor
          in: query
          required: false
          description: Opaque cursor from a previous page, or omit for the first page.
          schema:
            type:
              - string
              - "null"
          example: null
        - name: limit
          in: query
          required: false
          description: Maximum number of items to return (1–50). Defaults to 20.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          example: 20
      responses:
        "200":
          description: Feed page
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentFeed"
              examples:
                empty:
                  summary: Empty community feed
                  value:
                    items: []
                    next_cursor: null
                populated:
                  summary: Populated reverse-chronological page
                  value:
                    items:
                      - id: d4e5f6a7-b8c9-0123-def0-234567890123
                        image_url: https://storage.example/display-signed
                        thumbnail_url: https://storage.example/thumb-signed
                        user:
                          id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
                          username: sketchy_matt
                          display_name: Matt
                          avatar_url: null
                        prompt:
                          id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                          prompt_date: "2026-07-18"
                          word_1: Chocolate
                          word_2: Coffee
                          word_3: Banana
                        timer_mode: countdown
                        timer_seconds: 300
                        caption_preview: A quiet coffee and banana sketch.
                        like_count: 0
                        reflection_count: 0
                        viewer_has_liked: false
                        is_owner: false
                        published_at: "2026-07-18T20:12:00Z"
                    next_cursor: null
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sketch-sessions:
    post:
      operationId: createSketchSession
      tags:
        - sketch-sessions
      summary: Start a Sketch Session
      description: |
        Creates an authenticated Sketch Session for a published Daily Prompt.
        Guests persist sessions only on device and must not call this endpoint.
        Pass an `Idempotency-Key` header to safely retry create without
        duplicating sessions.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSketchSessionRequest"
            example:
              prompt_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
              timer_mode: countdown
              selected_timer_seconds: 300
              client_timezone: Europe/London
              client_session_id: local-session-001
      responses:
        "201":
          description: Sketch Session created
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SketchSession"
              example:
                id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                user_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
                prompt_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                timer_mode: countdown
                selected_timer_seconds: 300
                status: active
                started_at: "2026-07-18T20:00:00Z"
                paused_total_seconds: 0
                timer_completed_at: null
                finish_requested_at: null
                photo_step_reached_at: null
                upload_started_at: null
                upload_completed_at: null
                completed_at: null
                abandoned_at: null
                created_at: "2026-07-18T20:00:00Z"
                updated_at: "2026-07-18T20:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sketch-sessions/{session_id}:
    get:
      operationId: getSketchSession
      tags:
        - sketch-sessions
      summary: Get a Sketch Session
      description: |
        Returns a Sketch Session owned by the authenticated user.
        Non-owner and missing sessions both return `session_not_found`.
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          description: Sketch Session UUID.
          schema:
            $ref: "#/components/schemas/UUID"
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
      responses:
        "200":
          description: Sketch Session
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SketchSession"
              example:
                id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                user_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
                prompt_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                timer_mode: countdown
                selected_timer_seconds: 300
                status: active
                started_at: "2026-07-18T20:00:00Z"
                paused_total_seconds: 0
                timer_completed_at: null
                finish_requested_at: null
                photo_step_reached_at: null
                upload_started_at: null
                upload_completed_at: null
                completed_at: null
                abandoned_at: null
                created_at: "2026-07-18T20:00:00Z"
                updated_at: "2026-07-18T20:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sketch-sessions/{session_id}/events:
    post:
      operationId: postSketchSessionEvent
      tags:
        - sketch-sessions
      summary: Record a Sketch Session lifecycle event
      description: |
        Appends a lifecycle event and updates denormalised session timestamps
        and status when the transition is valid.
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          description: Sketch Session UUID.
          schema:
            $ref: "#/components/schemas/UUID"
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SketchSessionEventRequest"
            example:
              event_type: paused
              client_occurred_at: "2026-07-18T20:01:00Z"
              metadata: {}
      responses:
        "200":
          description: Updated Sketch Session after the event
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SketchSession"
              example:
                id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                user_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
                prompt_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                timer_mode: countdown
                selected_timer_seconds: 300
                status: paused
                started_at: "2026-07-18T20:00:00Z"
                paused_total_seconds: 0
                timer_completed_at: null
                finish_requested_at: null
                photo_step_reached_at: null
                upload_started_at: null
                upload_completed_at: null
                completed_at: null
                abandoned_at: null
                created_at: "2026-07-18T20:00:00Z"
                updated_at: "2026-07-18T20:01:00Z"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sketch-sessions/{session_id}/abandon:
    post:
      operationId: abandonSketchSession
      tags:
        - sketch-sessions
      summary: Abandon a Sketch Session
      description: |
        Marks the session abandoned. Calling abandon on an already-abandoned
        session is idempotent and returns the existing session.
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          description: Sketch Session UUID.
          schema:
            $ref: "#/components/schemas/UUID"
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
      responses:
        "200":
          description: Abandoned Sketch Session
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SketchSession"
              example:
                id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                user_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
                prompt_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                timer_mode: countdown
                selected_timer_seconds: 300
                status: abandoned
                started_at: "2026-07-18T20:00:00Z"
                paused_total_seconds: 0
                timer_completed_at: null
                finish_requested_at: null
                photo_step_reached_at: null
                upload_started_at: null
                upload_completed_at: null
                completed_at: null
                abandoned_at: "2026-07-18T20:05:00Z"
                created_at: "2026-07-18T20:00:00Z"
                updated_at: "2026-07-18T20:05:00Z"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/uploads:
    post:
      operationId: createUpload
      tags:
        - uploads
      summary: Create a direct-upload slot
      description: |
        Creates a pending Upload row and returns short-lived signed upload
        details for a single private object key. The client uploads bytes
        directly to object storage, then calls upload-complete.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadRequest"
            example:
              purpose: submission
              content_type: image/jpeg
              byte_size: 245760
      responses:
        "201":
          description: Upload slot created
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Upload"
              example:
                id: c3d4e5f6-a7b8-9012-cdef-123456789012
                purpose: submission
                status: pending
                content_type: image/jpeg
                byte_size: null
                width: null
                height: null
                created_at: "2026-07-18T20:10:00Z"
                uploaded_at: null
                verified_at: null
                consumed_at: null
                expires_at: "2026-07-18T20:25:00Z"
                signed_upload:
                  url: https://storage.example/upload-slot
                  method: PUT
                  headers:
                    Content-Type: image/jpeg
                  expires_at: "2026-07-18T20:25:00Z"
                  max_bytes: 10485760
                  content_type: image/jpeg
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/uploads/{upload_id}:
    get:
      operationId: getUpload
      tags:
        - uploads
      summary: Get an Upload
      description: |
        Returns an Upload owned by the authenticated user.
        Non-owner and missing uploads both return `upload_not_found`.
      security:
        - bearerAuth: []
      parameters:
        - name: upload_id
          in: path
          required: true
          description: Upload UUID.
          schema:
            $ref: "#/components/schemas/UUID"
          example: c3d4e5f6-a7b8-9012-cdef-123456789012
      responses:
        "200":
          description: Upload
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Upload"
              example:
                id: c3d4e5f6-a7b8-9012-cdef-123456789012
                purpose: submission
                status: ready
                content_type: image/jpeg
                byte_size: 198432
                width: 1600
                height: 1200
                created_at: "2026-07-18T20:10:00Z"
                uploaded_at: "2026-07-18T20:10:30Z"
                verified_at: "2026-07-18T20:10:31Z"
                consumed_at: null
                expires_at: "2026-07-18T20:25:00Z"
                signed_upload: null
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/uploads/{upload_id}/complete:
    post:
      operationId: completeUpload
      tags:
        - uploads
      summary: Complete and verify an Upload
      description: |
        Verifies the object exists in private storage, validates the image,
        strips unnecessary EXIF metadata, generates display and thumbnail
        derivatives, and marks the Upload ready for Submission consumption.
      security:
        - bearerAuth: []
      parameters:
        - name: upload_id
          in: path
          required: true
          description: Upload UUID.
          schema:
            $ref: "#/components/schemas/UUID"
          example: c3d4e5f6-a7b8-9012-cdef-123456789012
      responses:
        "200":
          description: Upload verified and ready
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Upload"
              example:
                id: c3d4e5f6-a7b8-9012-cdef-123456789012
                purpose: submission
                status: ready
                content_type: image/jpeg
                byte_size: 198432
                width: 1600
                height: 1200
                created_at: "2026-07-18T20:10:00Z"
                uploaded_at: "2026-07-18T20:10:30Z"
                verified_at: "2026-07-18T20:10:31Z"
                consumed_at: null
                expires_at: "2026-07-18T20:25:00Z"
                signed_upload: null
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/submissions:
    post:
      operationId: createSubmission
      tags:
        - submissions
      summary: Publish a Submission
      description: |
        Atomically creates a public Submission from a ready Upload and owned
        Sketch Session. Requires a completed profile. Pass an `Idempotency-Key`
        header to safely retry without duplicating Submissions.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionRequest"
            example:
              sketch_session_id: b2c3d4e5-f6a7-8901-bcde-f12345678901
              upload_id: c3d4e5f6-a7b8-9012-cdef-123456789012
              caption: A quiet coffee and banana sketch.
      responses:
        "201":
          description: Submission published
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
              example:
                id: d4e5f6a7-b8c9-0123-def0-234567890123
                caption: A quiet coffee and banana sketch.
                visibility: public
                status: published
                timer_mode: countdown
                timer_seconds: 300
                like_count: 0
                reflection_count: 0
                viewer_has_liked: false
                is_owner: true
                image_url: https://storage.example/display-signed
                thumbnail_url: https://storage.example/thumb-signed
                user:
                  id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
                  username: sketchy_matt
                  display_name: Matt
                  avatar_url: null
                prompt:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  prompt_date: "2026-07-18"
                  word_1: Chocolate
                  word_2: Coffee
                  word_3: Banana
                sketch_session_id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                upload_id: c3d4e5f6-a7b8-9012-cdef-123456789012
                published_at: "2026-07-18T20:12:00Z"
                created_at: "2026-07-18T20:12:00Z"
                updated_at: "2026-07-18T20:12:00Z"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/submissions/{submission_id}:
    get:
      operationId: getSubmission
      tags:
        - submissions
      summary: Get a Submission
      description: |
        Returns a published Submission. Available to guests and authenticated
        users. Soft-deleted, hidden, removed, and suspended/deleted-author
        Submissions are not returned. When authenticated, `is_owner` and
        `viewer_has_liked` reflect the viewer (`viewer_has_liked` remains
        false until Likes land in Phase 9).
      parameters:
        - name: submission_id
          in: path
          required: true
          description: Submission UUID.
          schema:
            $ref: "#/components/schemas/UUID"
          example: d4e5f6a7-b8c9-0123-def0-234567890123
      responses:
        "200":
          description: Submission
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
              example:
                id: d4e5f6a7-b8c9-0123-def0-234567890123
                caption: A quiet coffee and banana sketch.
                visibility: public
                status: published
                timer_mode: countdown
                timer_seconds: 300
                like_count: 0
                reflection_count: 0
                viewer_has_liked: false
                is_owner: false
                image_url: https://storage.example/display-signed
                thumbnail_url: https://storage.example/thumb-signed
                user:
                  id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
                  username: sketchy_matt
                  display_name: Matt
                  avatar_url: null
                prompt:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  prompt_date: "2026-07-18"
                  word_1: Chocolate
                  word_2: Coffee
                  word_3: Banana
                sketch_session_id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                upload_id: c3d4e5f6-a7b8-9012-cdef-123456789012
                published_at: "2026-07-18T20:12:00Z"
                created_at: "2026-07-18T20:12:00Z"
                updated_at: "2026-07-18T20:12:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteSubmission
      tags:
        - submissions
      summary: Delete own Submission
      description: |
        Soft-deletes a Submission owned by the authenticated user. The
        Submission is hidden from public GET, feed, and profile queries.
      security:
        - bearerAuth: []
      parameters:
        - name: submission_id
          in: path
          required: true
          description: Submission UUID.
          schema:
            $ref: "#/components/schemas/UUID"
          example: d4e5f6a7-b8c9-0123-def0-234567890123
      responses:
        "204":
          description: Submission deleted
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Descope-issued access/session JWT sent as Authorization Bearer token.
  headers:
    RequestId:
      description: |
        Opaque request correlation identifier. Clients may supply
        `X-Request-ID`; otherwise the server generates one. The same
        value is returned on every response and embedded in error bodies
        as `error.request_id`.
      required: true
      schema:
        type: string
        format: uuid
      example: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Client-generated key that makes a write operation safely retryable.
        Replaying the same key with the same request body returns the original
        response. Replaying with a different body returns `idempotency_key_conflict`.
      schema:
        type: string
        minLength: 1
        maxLength: 255
      example: sketch-session-create-7f3a9c2e
  responses:
    Unauthenticated:
      description: Missing or invalid bearer token
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: unauthenticated
              message: Authentication is required.
              details: {}
              request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
    Forbidden:
      description: Authenticated but not permitted (suspended or unavailable account)
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            account_suspended:
              summary: Suspended account
              value:
                error:
                  code: account_suspended
                  message: This account has been suspended.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            account_unavailable:
              summary: Deleted or pending deletion
              value:
                error:
                  code: account_unavailable
                  message: This account is no longer available.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            profile_incomplete:
              summary: Profile incomplete
              value:
                error:
                  code: profile_incomplete
                  message: Complete your profile before publishing.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
    Conflict:
      description: Request conflicts with existing state
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            username_taken:
              summary: Username already taken
              value:
                error:
                  code: username_taken
                  message: That username is already taken.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            idempotency_key_conflict:
              summary: Idempotency key reused with a different body
              value:
                error:
                  code: idempotency_key_conflict
                  message: This idempotency key was already used with a different request.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            upload_already_consumed:
              summary: Upload already consumed
              value:
                error:
                  code: upload_already_consumed
                  message: This upload has already been used.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            session_already_submitted:
              summary: Sketch Session already has a Submission
              value:
                error:
                  code: session_already_submitted
                  message: This sketch session already has a published submission.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
    NotFound:
      description: Requested resource was not found
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            user_not_found:
              summary: Public profile not found
              value:
                error:
                  code: user_not_found
                  message: The requested profile could not be found.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            prompt_not_found:
              summary: Daily Prompt not found
              value:
                error:
                  code: prompt_not_found
                  message: Today's prompt is not available yet.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            session_not_found:
              summary: Sketch Session not found
              value:
                error:
                  code: session_not_found
                  message: The requested sketch session could not be found.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            upload_not_found:
              summary: Upload not found
              value:
                error:
                  code: upload_not_found
                  message: The requested upload could not be found.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            submission_not_found:
              summary: Submission not found
              value:
                error:
                  code: submission_not_found
                  message: The requested sketch could not be found.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
    ValidationError:
      description: Request body failed validation or domain rules
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            username_invalid:
              summary: Invalid username format
              value:
                error:
                  code: username_invalid
                  message: Usernames must be 3–30 characters and use only letters, numbers, and underscores.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            username_reserved:
              summary: Reserved username
              value:
                error:
                  code: username_reserved
                  message: That username is reserved.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            invalid_timer_preference:
              summary: Invalid timer preference combination
              value:
                error:
                  code: invalid_timer_preference
                  message: Timer preference mode and seconds are inconsistent.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            invalid_timer_selection:
              summary: Invalid Sketch Session timer selection
              value:
                error:
                  code: invalid_timer_selection
                  message: Timer mode and selected seconds are inconsistent.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            invalid_session_transition:
              summary: Invalid Sketch Session lifecycle transition
              value:
                error:
                  code: invalid_session_transition
                  message: That lifecycle event is not valid for the current session state.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            upload_not_ready:
              summary: Upload not ready for consumption
              value:
                error:
                  code: upload_not_ready
                  message: This upload is not ready to publish yet.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            invalid_image:
              summary: Image could not be decoded or validated
              value:
                error:
                  code: invalid_image
                  message: The uploaded file is not a valid image.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            image_too_large:
              summary: Image exceeds size limit
              value:
                error:
                  code: image_too_large
                  message: That image is too large to upload.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            unsupported_media_type:
              summary: Unsupported image content type
              value:
                error:
                  code: unsupported_media_type
                  message: That image type is not supported.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            object_missing:
              summary: Storage object missing after direct upload
              value:
                error:
                  code: object_missing
                  message: The uploaded image could not be found. Please try again.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
            validation_error:
              summary: Schema validation failure
              value:
                error:
                  code: validation_error
                  message: The request could not be validated.
                  details: {}
                  request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
    InternalError:
      description: Unexpected server error
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: internal_error
              message: An unexpected error occurred.
              details: {}
              request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
  schemas:
    UUID:
      type: string
      format: uuid
      description: Canonical UUID string identifier.
      example: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 UTC timestamp.
      example: "2026-07-18T20:00:00Z"
    ErrorBody:
      type: object
      required:
        - code
        - message
        - details
        - request_id
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
          example: submission_not_found
        message:
          type: string
          description: User-safe explanation of the error.
          example: The requested sketch could not be found.
        details:
          type: object
          additionalProperties: true
          description: Optional structured details for clients and support.
          example: {}
        request_id:
          $ref: "#/components/schemas/UUID"
    Error:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
      example:
        error:
          code: submission_not_found
          message: The requested sketch could not be found.
          details: {}
          request_id: f7d7c950-2892-4b6c-9300-ef6c5cbcb2d1
    CursorPage:
      type: object
      required:
        - items
        - next_cursor
      properties:
        items:
          type: array
          description: Page of results. Concrete item schemas are defined per endpoint.
          items: {}
        next_cursor:
          type:
            - string
            - "null"
          description: Opaque cursor for the next page, or null when no further pages exist.
      example:
        items: []
        next_cursor: null
    HealthLiveResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    HealthReadyResponse:
      type: object
      required:
        - status
        - checks
      properties:
        status:
          type: string
          enum:
            - ok
            - unavailable
        checks:
          type: object
          additionalProperties:
            type: string
    UserStatus:
      type: string
      description: Local application account lifecycle status.
      enum:
        - incomplete
        - active
        - suspended
        - pending_deletion
        - deleted
    TimerMode:
      type: string
      description: Remembered Sketch Session timer mode.
      enum:
        - countdown
        - no_timer
    AppearancePreference:
      type: string
      description: Preferred colour appearance.
      enum:
        - system
        - light
        - dark
    PreferencesSummary:
      type: object
      description: |
        Preference summary returned with the current user and preferences endpoints.
        Values are persisted in `user_preferences`.
      required:
        - notifications_enabled
        - notification_time_local
        - timezone
        - remember_timer_option
        - remembered_timer_mode
        - remembered_timer_seconds
        - appearance
      properties:
        notifications_enabled:
          type: boolean
          example: false
        notification_time_local:
          type:
            - string
            - "null"
          description: Local reminder time as HH:MM:SS, or null when unset.
          example: null
        timezone:
          type: string
          example: UTC
        remember_timer_option:
          type: boolean
          example: false
        remembered_timer_mode:
          oneOf:
            - $ref: "#/components/schemas/TimerMode"
            - type: "null"
          example: null
        remembered_timer_seconds:
          type:
            - integer
            - "null"
          example: null
        appearance:
          $ref: "#/components/schemas/AppearancePreference"
    PreferencesUpdate:
      type: object
      description: Partial preferences update. Omitted fields are left unchanged.
      additionalProperties: false
      properties:
        notifications_enabled:
          type: boolean
        notification_time_local:
          type:
            - string
            - "null"
          description: Local reminder time as HH:MM:SS, or null to clear.
          example: "09:00:00"
        timezone:
          type: string
          example: UTC
        remember_timer_option:
          type: boolean
        remembered_timer_mode:
          oneOf:
            - $ref: "#/components/schemas/TimerMode"
            - type: "null"
        remembered_timer_seconds:
          type:
            - integer
            - "null"
          description: Allowed countdown values are 60, 180, 300, or 600.
        appearance:
          $ref: "#/components/schemas/AppearancePreference"
    UpdateMeRequest:
      type: object
      description: Partial profile update. Omitted fields are left unchanged.
      additionalProperties: false
      properties:
        username:
          type: string
          description: |
            Public username. Must match `^[A-Za-z0-9_]{3,30}$`.
            Uniqueness is case-insensitive.
          minLength: 3
          maxLength: 30
          example: sketchy_matt
        display_name:
          type: string
          minLength: 1
          maxLength: 120
          example: Matt
        bio:
          type:
            - string
            - "null"
          description: Optional short bio. Null clears an existing bio.
          maxLength: 280
          example: Sketching every day.
    CurrentUser:
      type: object
      required:
        - id
        - username
        - display_name
        - profile_completed
        - status
        - preferences
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        username:
          type:
            - string
            - "null"
          description: Public username; null until profile completion.
          example: null
        display_name:
          type: string
          example: New sketcher
        profile_completed:
          type: boolean
          description: True when profile_completed_at is set.
          example: false
        status:
          $ref: "#/components/schemas/UserStatus"
        preferences:
          $ref: "#/components/schemas/PreferencesSummary"
    PublicUser:
      type: object
      description: Public-safe user projection. Excludes private and moderation fields.
      required:
        - id
        - username
        - display_name
        - bio
        - avatar_url
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        username:
          type: string
          example: sketchy_matt
        display_name:
          type: string
          example: Matt
        bio:
          type:
            - string
            - "null"
          example: Sketching every day.
        avatar_url:
          type:
            - string
            - "null"
          description: Signed or CDN avatar URL when available; null until avatar upload exists.
          example: null
    PromptStatus:
      type: string
      description: Daily Prompt publication lifecycle status.
      enum:
        - draft
        - published
        - withdrawn
    DailyPrompt:
      type: object
      description: |
        Shared three-word Daily Prompt for one Prompt Date.
        Words are returned in fixed display order (word_1, word_2, word_3).
      required:
        - id
        - prompt_date
        - word_1
        - word_2
        - word_3
        - status
        - published_at
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        prompt_date:
          type: string
          format: date
          description: UTC Prompt Date to which this Daily Prompt belongs.
          example: "2026-07-18"
        word_1:
          type: string
          minLength: 1
          example: Chocolate
        word_2:
          type: string
          minLength: 1
          example: Coffee
        word_3:
          type: string
          minLength: 1
          example: Banana
        status:
          $ref: "#/components/schemas/PromptStatus"
        published_at:
          type:
            - string
            - "null"
          format: date-time
          description: When the prompt was published; null for draft prompts.
          example: "2026-07-17T00:00:00Z"
    FeedPromptSummary:
      type: object
      description: Compact Prompt projection embedded in feed items.
      required:
        - id
        - prompt_date
        - word_1
        - word_2
        - word_3
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        prompt_date:
          type: string
          format: date
          example: "2026-07-18"
        word_1:
          type: string
          example: Chocolate
        word_2:
          type: string
          example: Coffee
        word_3:
          type: string
          example: Banana
    FeedUserSummary:
      type: object
      description: Compact public user projection embedded in feed items.
      required:
        - id
        - username
        - display_name
        - avatar_url
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        username:
          type: string
          example: sketchy_matt
        display_name:
          type: string
          example: Matt
        avatar_url:
          type:
            - string
            - "null"
          example: null
    FeedItem:
      type: object
      description: |
        Feed projection for a published Submission. Includes image URLs,
        user and Prompt summaries, timer metadata, caption preview,
        Like/Reflection counts, viewer Like state, and ownership flags.
      required:
        - id
        - image_url
        - thumbnail_url
        - user
        - prompt
        - timer_mode
        - timer_seconds
        - caption_preview
        - like_count
        - reflection_count
        - viewer_has_liked
        - is_owner
        - published_at
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        image_url:
          type: string
          format: uri
          description: Display image URL.
        thumbnail_url:
          type: string
          format: uri
          description: Thumbnail image URL.
        user:
          $ref: "#/components/schemas/FeedUserSummary"
        prompt:
          $ref: "#/components/schemas/FeedPromptSummary"
        timer_mode:
          $ref: "#/components/schemas/TimerMode"
        timer_seconds:
          type:
            - integer
            - "null"
          description: Selected countdown seconds, or null for no_timer.
        caption_preview:
          type:
            - string
            - "null"
          description: Truncated caption preview, or null when absent.
        like_count:
          type: integer
          minimum: 0
        reflection_count:
          type: integer
          minimum: 0
        viewer_has_liked:
          type: boolean
        is_owner:
          type: boolean
        published_at:
          $ref: "#/components/schemas/Timestamp"
    RecentFeed:
      type: object
      description: Cursor-paginated recent community feed page.
      required:
        - items
        - next_cursor
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FeedItem"
        next_cursor:
          type:
            - string
            - "null"
          description: Opaque cursor for the next page, or null when no further pages exist.
          example: null
    SketchSessionStatus:
      type: string
      description: Sketch Session lifecycle status.
      enum:
        - active
        - paused
        - ready_for_photo
        - uploading
        - completed
        - abandoned
        - expired
    SketchSessionEventType:
      type: string
      description: Sketch Session lifecycle event type.
      enum:
        - started
        - paused
        - resumed
        - timer_completed
        - finished_early
        - photo_step_reached
        - upload_started
        - upload_completed
        - submission_created
        - abandoned
    CreateSketchSessionRequest:
      type: object
      description: |
        Authenticated Sketch Session create payload.
        Countdown mode requires selected_timer_seconds in {60, 180, 300, 600}.
        No-timer mode requires selected_timer_seconds to be null.
      additionalProperties: false
      required:
        - prompt_id
        - timer_mode
      properties:
        prompt_id:
          $ref: "#/components/schemas/UUID"
        timer_mode:
          $ref: "#/components/schemas/TimerMode"
        selected_timer_seconds:
          type:
            - integer
            - "null"
          description: Countdown duration in seconds, or null for no_timer.
          example: 300
        client_timezone:
          type:
            - string
            - "null"
          description: Optional IANA timezone reported by the client for analytics.
          example: Europe/London
        client_session_id:
          type:
            - string
            - "null"
          description: Optional local session identifier for recovery correlation.
          maxLength: 128
          example: local-session-001
    SketchSession:
      type: object
      description: Authenticated Sketch Session record.
      required:
        - id
        - user_id
        - prompt_id
        - timer_mode
        - selected_timer_seconds
        - status
        - started_at
        - paused_total_seconds
        - timer_completed_at
        - finish_requested_at
        - photo_step_reached_at
        - upload_started_at
        - upload_completed_at
        - completed_at
        - abandoned_at
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        user_id:
          $ref: "#/components/schemas/UUID"
        prompt_id:
          $ref: "#/components/schemas/UUID"
        timer_mode:
          $ref: "#/components/schemas/TimerMode"
        selected_timer_seconds:
          type:
            - integer
            - "null"
          example: 300
        status:
          $ref: "#/components/schemas/SketchSessionStatus"
        started_at:
          $ref: "#/components/schemas/Timestamp"
        paused_total_seconds:
          type: integer
          minimum: 0
          example: 0
        timer_completed_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        finish_requested_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        photo_step_reached_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        upload_started_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        upload_completed_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        completed_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        abandoned_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"
    SketchSessionEventRequest:
      type: object
      description: Client lifecycle event recorded against a Sketch Session.
      additionalProperties: false
      required:
        - event_type
      properties:
        event_type:
          $ref: "#/components/schemas/SketchSessionEventType"
        client_occurred_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
          description: Optional client-side occurrence time.
        metadata:
          type: object
          additionalProperties: true
          description: Optional structured metadata for the event.
          default: {}
    UploadPurpose:
      type: string
      description: Intended use of an Upload.
      enum:
        - submission
        - avatar
    UploadStatus:
      type: string
      description: Upload lifecycle status.
      enum:
        - pending
        - uploaded
        - verified
        - processing
        - ready
        - consumed
        - failed
        - expired
        - deleted
    CreateUploadRequest:
      type: object
      description: |
        Request a direct-upload slot. `content_type` must be an allowed image MIME
        type such as `image/jpeg` or `image/png`. `byte_size` is the client's
        expected size and must not exceed the configured maximum.
      additionalProperties: false
      required:
        - purpose
        - content_type
        - byte_size
      properties:
        purpose:
          $ref: "#/components/schemas/UploadPurpose"
        content_type:
          type: string
          example: image/jpeg
        byte_size:
          type: integer
          minimum: 1
          example: 245760
    SignedUpload:
      type: object
      description: Short-lived details for a direct client-to-storage upload.
      required:
        - url
        - method
        - headers
        - expires_at
        - max_bytes
        - content_type
      properties:
        url:
          type: string
          format: uri
          description: Signed upload URL. Clients must not log or permanently store this value.
        method:
          type: string
          enum:
            - PUT
          example: PUT
        headers:
          type: object
          additionalProperties:
            type: string
          description: Required request headers for the signed upload.
          example:
            Content-Type: image/jpeg
        expires_at:
          $ref: "#/components/schemas/Timestamp"
        max_bytes:
          type: integer
          minimum: 1
          example: 10485760
        content_type:
          type: string
          example: image/jpeg
    Upload:
      type: object
      description: Upload slot and verification state. Storage keys are never exposed.
      required:
        - id
        - purpose
        - status
        - content_type
        - byte_size
        - width
        - height
        - created_at
        - uploaded_at
        - verified_at
        - consumed_at
        - expires_at
        - signed_upload
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        purpose:
          $ref: "#/components/schemas/UploadPurpose"
        status:
          $ref: "#/components/schemas/UploadStatus"
        content_type:
          type: string
          example: image/jpeg
        byte_size:
          type:
            - integer
            - "null"
          example: 198432
        width:
          type:
            - integer
            - "null"
          example: 1600
        height:
          type:
            - integer
            - "null"
          example: 1200
        created_at:
          $ref: "#/components/schemas/Timestamp"
        uploaded_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        verified_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        consumed_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        expires_at:
          $ref: "#/components/schemas/Timestamp"
        signed_upload:
          oneOf:
            - $ref: "#/components/schemas/SignedUpload"
            - type: "null"
          description: Present when status is pending and a signed upload is available.
    SubmissionVisibility:
      type: string
      description: Submission visibility. Version one supports public only.
      enum:
        - public
    SubmissionStatus:
      type: string
      description: Submission lifecycle status.
      enum:
        - processing
        - published
        - hidden
        - removed
        - deleted
    CreateSubmissionRequest:
      type: object
      description: |
        Publish a reviewed sketch. The backend derives owner, Prompt, and timer
        metadata from the Sketch Session and Upload.
      additionalProperties: false
      required:
        - sketch_session_id
        - upload_id
      properties:
        sketch_session_id:
          $ref: "#/components/schemas/UUID"
        upload_id:
          $ref: "#/components/schemas/UUID"
        caption:
          type:
            - string
            - "null"
          description: Optional plain-text caption.
          maxLength: 280
          example: A quiet coffee and banana sketch.
    Submission:
      type: object
      description: Public Submission projection with signed media URLs.
      required:
        - id
        - caption
        - visibility
        - status
        - timer_mode
        - timer_seconds
        - like_count
        - reflection_count
        - viewer_has_liked
        - is_owner
        - image_url
        - thumbnail_url
        - user
        - prompt
        - sketch_session_id
        - upload_id
        - published_at
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        caption:
          type:
            - string
            - "null"
          example: A quiet coffee and banana sketch.
        visibility:
          $ref: "#/components/schemas/SubmissionVisibility"
        status:
          $ref: "#/components/schemas/SubmissionStatus"
        timer_mode:
          $ref: "#/components/schemas/TimerMode"
        timer_seconds:
          type:
            - integer
            - "null"
          description: Selected countdown seconds, or null for no_timer.
          example: 300
        like_count:
          type: integer
          minimum: 0
          example: 0
        reflection_count:
          type: integer
          minimum: 0
          example: 0
        viewer_has_liked:
          type: boolean
          example: false
        is_owner:
          type: boolean
          example: true
        image_url:
          type: string
          format: uri
          description: Short-lived signed display image URL.
        thumbnail_url:
          type: string
          format: uri
          description: Short-lived signed thumbnail URL.
        user:
          $ref: "#/components/schemas/FeedUserSummary"
        prompt:
          $ref: "#/components/schemas/FeedPromptSummary"
        sketch_session_id:
          $ref: "#/components/schemas/UUID"
        upload_id:
          $ref: "#/components/schemas/UUID"
        published_at:
          $ref: "#/components/schemas/Timestamp"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"
tags:
  - name: health
    description: Process health probes
  - name: me
    description: Authenticated current-user endpoints
  - name: users
    description: Public user profile endpoints
  - name: prompts
    description: Shared Daily Prompt endpoints
  - name: feed
    description: Community feed endpoints
  - name: sketch-sessions
    description: Authenticated Sketch Session and timer lifecycle endpoints
  - name: uploads
    description: Direct signed upload orchestration endpoints
  - name: submissions
    description: Submission publication and ownership endpoints
