name: DailySketch
options:
  bundleIdPrefix: com.example.dailysketch
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  developmentLanguage: en
  xcodeVersion: "16.0"
  defaultConfig: Debug-Local
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"
    GENERATE_INFOPLIST_FILE: YES
configs:
  Debug-Local: debug
  Debug-Development: debug
  Release-Staging: release
  Release-Production: release
packages:
  DailySketchAPI:
    path: ../api/generated/ios
  DescopeKit:
    url: https://github.com/descope/descope-swift
    from: 0.9.0
targets:
  DailySketch:
    type: application
    platform: iOS
    sources:
      - path: DailySketch
    info:
      path: DailySketch/Resources/Info.plist
      properties:
        API_BASE_URL: $(API_BASE_URL)
        APP_ENVIRONMENT: $(APP_ENVIRONMENT)
        DESCOPE_PROJECT_ID: $(DESCOPE_PROJECT_ID)
        SUPPORT_URL: $(SUPPORT_URL)
        PRIVACY_URL: $(PRIVACY_URL)
        TERMS_URL: $(TERMS_URL)
        COMMUNITY_GUIDELINES_URL: $(COMMUNITY_GUIDELINES_URL)
        SENTRY_DSN: $(SENTRY_DSN)
        SHOW_ENVIRONMENT_BADGE: $(SHOW_ENVIRONMENT_BADGE)
        ANALYTICS_ENVIRONMENT: $(ANALYTICS_ENVIRONMENT)
        BRAND_NAME: $(BRAND_NAME)
        CREATIVE_TYPE_ID: $(CREATIVE_TYPE_ID)
        NSCameraUsageDescription: Daily Sketch uses the camera so you can photograph your drawing and share it with the community.
        NSPhotoLibraryUsageDescription: Daily Sketch accesses your photo library so you can choose an existing sketch photo to review and share.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    configFiles:
      Debug-Local: Config/Debug-Local.xcconfig
      Debug-Development: Config/Debug-Development.xcconfig
      Release-Staging: Config/Release-Staging.xcconfig
      Release-Production: Config/Release-Production.xcconfig
    dependencies:
      - package: DailySketchAPI
      - package: DescopeKit
    settings:
      base:
        PRODUCT_NAME: DailySketch
        INFOPLIST_FILE: DailySketch/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
  DailyStory:
    type: application
    platform: iOS
    sources:
      - path: DailyStory
      - path: DailySketch/Core
      - path: DailySketch/App
        excludes:
          - DailySketchApp.swift
      - path: DailySketch/Features/Auth
      - path: DailySketch/Features/Profile
      - path: DailySketch/Features/Settings
      - path: DailySketch/Features/Onboarding
      - path: DailySketch/Features/Blocking
      - path: DailySketch/Features/Reporting
      - path: DailySketch/Features/SubmissionDetail
      - path: DailySketch/Features/TimerSelection
    info:
      path: DailyStory/Resources/Info.plist
      properties:
        API_BASE_URL: $(API_BASE_URL)
        APP_ENVIRONMENT: $(APP_ENVIRONMENT)
        DESCOPE_PROJECT_ID: $(DESCOPE_PROJECT_ID)
        SUPPORT_URL: $(SUPPORT_URL)
        PRIVACY_URL: $(PRIVACY_URL)
        TERMS_URL: $(TERMS_URL)
        COMMUNITY_GUIDELINES_URL: $(COMMUNITY_GUIDELINES_URL)
        SENTRY_DSN: $(SENTRY_DSN)
        SHOW_ENVIRONMENT_BADGE: $(SHOW_ENVIRONMENT_BADGE)
        ANALYTICS_ENVIRONMENT: $(ANALYTICS_ENVIRONMENT)
        BRAND_NAME: $(BRAND_NAME)
        CREATIVE_TYPE_ID: $(CREATIVE_TYPE_ID)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    configFiles:
      Debug-Local: Config/DailyStory/Debug-Local.xcconfig
      Debug-Development: Config/DailyStory/Debug-Development.xcconfig
      Release-Staging: Config/DailyStory/Release-Staging.xcconfig
      Release-Production: Config/DailyStory/Release-Production.xcconfig
    dependencies:
      - package: DailySketchAPI
      - package: DescopeKit
    settings:
      base:
        PRODUCT_NAME: DailyStory
        INFOPLIST_FILE: DailyStory/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
  DailySketchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DailySketchTests
    dependencies:
      - target: DailySketch
    configFiles:
      Debug-Local: Config/Debug-Local.xcconfig
      Debug-Development: Config/Debug-Development.xcconfig
      Release-Staging: Config/Release-Staging.xcconfig
      Release-Production: Config/Release-Production.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.dailysketch.dev.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DailySketch.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DailySketch"
        BUNDLE_LOADER: "$(TEST_HOST)"
  DailySketchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DailySketchUITests
    dependencies:
      - target: DailySketch
    configFiles:
      Debug-Local: Config/Debug-Local.xcconfig
      Debug-Development: Config/Debug-Development.xcconfig
      Release-Staging: Config/Release-Staging.xcconfig
      Release-Production: Config/Release-Production.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.dailysketch.dev.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DailySketch
schemes:
  DailySketch:
    build:
      targets:
        DailySketch: all
        DailySketchTests: [test]
        DailySketchUITests: [test]
    run:
      config: Debug-Local
    test:
      config: Debug-Local
      targets:
        - DailySketchTests
        - DailySketchUITests
    analyze:
      config: Debug-Local
    profile:
      config: Release-Production
    archive:
      config: Release-Production
  DailySketch Development:
    build:
      targets:
        DailySketch: all
    run:
      config: Debug-Development
    test:
      config: Debug-Development
    analyze:
      config: Debug-Development
    profile:
      config: Release-Staging
    archive:
      config: Release-Staging
  DailySketch Staging:
    build:
      targets:
        DailySketch: all
    run:
      config: Release-Staging
    test:
      config: Release-Staging
    analyze:
      config: Release-Staging
    profile:
      config: Release-Staging
    archive:
      config: Release-Staging
  DailySketch Production:
    build:
      targets:
        DailySketch: all
    run:
      config: Release-Production
    test:
      config: Release-Production
    analyze:
      config: Release-Production
    profile:
      config: Release-Production
    archive:
      config: Release-Production
  DailyStory:
    build:
      targets:
        DailyStory: all
    run:
      config: Debug-Local
    test:
      config: Debug-Local
    analyze:
      config: Debug-Local
    profile:
      config: Release-Production
    archive:
      config: Release-Production
  DailyStory Development:
    build:
      targets:
        DailyStory: all
    run:
      config: Debug-Development
    test:
      config: Debug-Development
    analyze:
      config: Debug-Development
    profile:
      config: Release-Staging
    archive:
      config: Release-Staging
  DailyStory Staging:
    build:
      targets:
        DailyStory: all
    run:
      config: Release-Staging
    test:
      config: Release-Staging
    analyze:
      config: Release-Staging
    profile:
      config: Release-Staging
    archive:
      config: Release-Staging
  DailyStory Production:
    build:
      targets:
        DailyStory: all
    run:
      config: Release-Production
    test:
      config: Release-Production
    analyze:
      config: Release-Production
    profile:
      config: Release-Production
    archive:
      config: Release-Production
