services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dailysketch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dailysketch}
      POSTGRES_DB: ${POSTGRES_DB:-dailysketch}
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18+ images expect the mount at /var/lib/postgresql (versioned data dir inside).
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dailysketch} -d ${POSTGRES_DB:-dailysketch}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 1; done;
      mc mb --ignore-existing local/$${STORAGE_BUCKET:-dailysketch-local-media};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-dailysketch-local-media}
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      API_PUBLIC_URL: http://localhost:8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dailysketch}:${POSTGRES_PASSWORD:-dailysketch}@postgres:5432/${POSTGRES_DB:-dailysketch}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: ${STORAGE_BUCKET:-dailysketch-local-media}
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_USE_SSL: "false"
      DESCOPE_PROJECT_ID: ${DESCOPE_PROJECT_ID:-replace-me}
      DESCOPE_ISSUER: ${DESCOPE_ISSUER:-https://api.descope.com/v1/apps/replace-me}
      DESCOPE_AUDIENCE: ${DESCOPE_AUDIENCE:-replace-me}
      DESCOPE_JWKS_URL: ${DESCOPE_JWKS_URL:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["migrate"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dailysketch}:${POSTGRES_PASSWORD:-dailysketch}@postgres:5432/${POSTGRES_DB:-dailysketch}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["alembic", "upgrade", "head"]
    restart: "no"

volumes:
  postgres_data:
  minio_data:
